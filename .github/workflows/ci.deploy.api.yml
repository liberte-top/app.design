name: ci.deploy.api

on:
  workflow_dispatch: {}
  push:
    branches:
      - main
    paths:
      - "api/**"
      - ".github/workflows/ci.deploy.api.yml"
  pull_request:
    paths:
      - "api/**"
      - ".github/workflows/ci.deploy.api.yml"

jobs:
  build-test-api:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Run tests
        working-directory: api
        run: cargo test --locked

      - name: Build API image
        run: docker build ./api

      - name: Setup Buildx
        if: github.event_name != 'pull_request'
        uses: docker/setup-buildx-action@v4.0.0

      - name: Login to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push API image
        if: github.event_name != 'pull_request'
        uses: docker/build-push-action@v7.1.0
        with:
          context: ./api
          push: true
          tags: |
            ghcr.io/liberte-top/app-design-api:main
            ghcr.io/liberte-top/app-design-api:sha-${{ github.sha }}

      - name: Checkout kubernetes repo
        if: github.event_name != 'pull_request'
        uses: actions/checkout@v6.0.2
        with:
          repository: liberte-top/kubernetes
          ref: main
          token: ${{ secrets.KUBERNETES_REPO_TOKEN }}
          path: kubernetes

      - name: Update design-api image tag
        if: github.event_name != 'pull_request'
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path

          path = Path('kubernetes/charts/app/design/values.yaml')
          replacement = '    tag: sha-${{ github.sha }} # design-api-image'
          lines = []
          for line in path.read_text().splitlines():
            if line.strip().endswith('# design-api-image'):
              line = replacement
            lines.append(line)
          path.write_text('\n'.join(lines) + '\n')
          PY
      - name: Create kubernetes promotion PR
        if: github.event_name != 'pull_request'
        id: create_pr
        uses: peter-evans/create-pull-request@v8.1.1
        with:
          token: ${{ secrets.KUBERNETES_REPO_TOKEN }}
          path: kubernetes
          branch: promote/design-api-${{ github.sha }}
          delete-branch: true
          commit-message: "chore: promote design-api image"
          title: "chore: promote design-api image"
          body: |
            Update `design-api` to `ghcr.io/liberte-top/app-design-api:sha-${{ github.sha }}`.

      - name: Enable PR auto-merge
        if: github.event_name != 'pull_request' && steps.create_pr.outputs.pull-request-number != ''
        env:
          GH_TOKEN: ${{ secrets.KUBERNETES_REPO_TOKEN }}
        run: |
          set -euo pipefail
          pr_number="${{ steps.create_pr.outputs.pull-request-number }}"
          gh pr merge --repo "liberte-top/kubernetes" --squash "$pr_number" || {
            gh pr update-branch --repo "liberte-top/kubernetes" "$pr_number" --rebase
            gh pr merge --repo "liberte-top/kubernetes" --squash "$pr_number"
          }
